<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Sun rays -->
  <g stroke="#ffd54f" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="10" x2="32" y2="15"/>
    <line x1="32" y1="49" x2="32" y2="54"/>
    <line x1="10" y1="32" x2="15" y2="32"/>
    <line x1="49" y1="32" x2="54" y2="32"/>
    <line x1="17" y1="17" x2="20.5" y2="20.5"/>
    <line x1="43.5" y1="43.5" x2="47" y2="47"/>
    <line x1="47" y1="17" x2="43.5" y2="20.5"/>
    <line x1="20.5" y1="43.5" x2="17" y2="47"/>
  </g>

  <!-- Sun core -->
  <circle cx="32" cy="32" r="9" fill="#ffd54f"/>

  <!-- Small cloud overlay -->
  <ellipse cx="38" cy="40" rx="9" ry="6" fill="rgba(255,255,255,0.85)"/>
  <ellipse cx="33" cy="42" rx="7" ry="5" fill="rgba(255,255,255,0.85)"/>
  <ellipse cx="35" cy="38" rx="6" ry="5" fill="rgba(255,255,255,0.85)"/>
</svg>
